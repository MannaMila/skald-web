<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Support for Skald: Odyssey, an Odyssey reader app by MannaMila LLC">
    <link rel="canonical" href="https://www.mannamila.com/skald/support">
    <title>Skald: Odyssey Support | MannaMila LLC</title>
    <style>
      :root {
        color-scheme: dark;
        --graphite: #101417;
        --graphite-2: #171e22;
        --line: rgba(190, 211, 213, 0.16);
        --line-strong: rgba(190, 211, 213, 0.34);
        --paper: #f4f5f0;
        --muted: rgba(244, 245, 240, 0.72);
        --teal: #54d6c6;
        --gold: #d9b86f;
        --copper: #c87752;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
      }
      body {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        line-height: 1.65;
        color: var(--paper);
        background:
          linear-gradient(90deg, rgba(16, 20, 23, 0.96), rgba(19, 27, 31, 0.72) 46%, rgba(16, 20, 23, 0.9)),
          repeating-linear-gradient(90deg, transparent 0 85px, rgba(255, 255, 255, 0.035) 86px),
          repeating-linear-gradient(0deg, transparent 0 85px, rgba(255, 255, 255, 0.025) 86px),
          var(--graphite);
      }
      main {
        max-width: 44rem;
        margin: 0 auto;
        padding: clamp(2rem, 6vw, 3.5rem) 1.25rem 4.5rem;
      }
      .eyebrow {
        margin: 0 0 14px;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--gold);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.9rem, 5vw, 2.6rem);
        line-height: 1.05;
        font-weight: 650;
        letter-spacing: 0;
      }
      p, li { color: var(--muted); }
      a { color: var(--teal); text-decoration-color: rgba(84, 214, 198, 0.45); }
      a:hover { text-decoration-color: var(--teal); }
      strong { color: var(--paper); font-weight: 650; }
      nav.back-links {
        margin-top: 2.6rem;
        padding-top: 1.4rem;
        border-top: 1px solid var(--line);
        font-size: 0.92rem;
      }
      nav.back-links a { margin-right: 1.5rem; }
    </style>
  </head>
  <body>
    <main>
    <p class="eyebrow">MannaMila LLC</p>
    <h1>Skald: Odyssey Support</h1>

    <p>Need help with Skald: Odyssey? Email <strong>support@mannamila.com</strong>. For privacy questions or a telemetry data deletion request, email <strong>privacy@mannamila.com</strong> and include the Analytics ID shown in the app.</p>

    <nav class="back-links">
      <a href="https://www.mannamila.com/skald">&larr; Skald: Odyssey</a>
      <a href="https://www.mannamila.com/skald/privacy">Privacy policy</a>
    </nav>
    </main>
  </body>
</html>
